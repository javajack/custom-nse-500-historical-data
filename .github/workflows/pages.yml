name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build_docs.py'
      - 'data/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Build docs site (manifest, stats, year pages, OG image)
        run: uv run python scripts/build_docs.py
      - name: Stage Pages artifact (merge docs/ + data/)
        run: |
          mkdir -p _site
          cp -a docs/. _site/
          # Serve the raw + parquet + actions files at /data/... so the
          # URL patterns in api.html actually resolve. data/db is gitignored
          # and rebuilt in the build step; skip data/derived (internal).
          mkdir -p _site/data
          cp -a data/raw      _site/data/
          cp -a data/parquet  _site/data/
          cp -a data/actions  _site/data/
          [ -f data/state.json ] && cp data/state.json _site/data/ || true
          # sanity
          echo "artifact size:"; du -sh _site
          echo "top-level entries:"; ls _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
